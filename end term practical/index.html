<!DOCTYPE html>
<html>
<head>
<title>Countdown Timer</title>
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:Arial;
}
.box{
    background:#fff;
    padding:25px;
    border-radius:10px;
    text-align:center;
}
input,button{
    padding:10px;
    margin:10px;
    border-radius:5px;
}
button{
    background:#667eea;
    color:white;
    border:none;
    cursor:pointer;
}
#result{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="box">
    <h2>Countdown Timer</h2>
    <input type="number" id="num" placeholder="Enter Number">
    <button onclick="countdown()">Start</button>
    <div id="result"></div>
</div>

<script>
function countdown(){
    let n=document.getElementById("num").value,r="";
    for(let i=n;i>=1;i--) r+=i+"<br>";
    document.getElementById("result").innerHTML=r;
}
</script>

</body>
</html>
